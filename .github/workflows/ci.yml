name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Build & test (all modules)
        run: ./gradlew build --no-daemon

      # R-45 (평가 심화 (2)-1): SonarCloud public 무료 plan + Quality Gate.
      # 활성화: GitHub Org Secret SONAR_TOKEN + Org Variable SONARCLOUD_ENABLED=true
      - name: SonarCloud scan
        if: vars.SONARCLOUD_ENABLED == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon

      - name: Publish to local maven (smoke check)
        run: ./gradlew publishToMavenLocal --no-daemon
