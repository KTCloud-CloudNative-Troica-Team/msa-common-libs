name: Publish

# 태그(`v*`) 푸시 시 4개 모듈을 GitHub Packages로 publish.
# 버전은 gradle.properties의 `version`을 태그 이름(`refs/tags/v0.1.0` → `0.1.0`)으로 override.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build all modules
        run: ./gradlew build -Pversion=${{ steps.ver.outputs.version }} --no-daemon

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish -Pversion=${{ steps.ver.outputs.version }} --no-daemon
