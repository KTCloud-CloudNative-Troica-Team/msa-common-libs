syntax = "proto3";

package troica.order.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.troica.msa.events.order.v1";
option java_multiple_files = true;

// Topic: order.cancelled
// Producer: order-service
// Consumer: notification-service (이메일 + Slack 운영 채널), inventory-service (보상 트랜잭션)
// 의미: 재고 부족/오류 → 주문 취소. 이미 RESERVED된 재고는 보상으로 release 필요.
message OrderCancelled {
  string idempotency_key = 1;
  int64 order_id = 2;
  string user_id = 3;
  CancellationReason reason = 4;
  string detail = 5;
  google.protobuf.Timestamp cancelled_at = 6;
}

enum CancellationReason {
  CANCELLATION_REASON_UNSPECIFIED = 0;
  CANCELLATION_REASON_INSUFFICIENT_INVENTORY = 1;
  CANCELLATION_REASON_PAYMENT_FAILED = 2;        // 시뮬레이션용 (payment-service 없음)
  CANCELLATION_REASON_USER_REQUESTED = 3;
  CANCELLATION_REASON_SYSTEM_ERROR = 4;
}
