syntax = "proto3";

package troica.order.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.troica.msa.events.order.v1";
option java_multiple_files = true;

// Topic: order.confirmed
// Producer: order-service
// Consumer: notification-service (이메일 + Slack 운영 채널)
// 의미: 모든 재고 예약 성공 → 주문 확정.
message OrderConfirmed {
  string idempotency_key = 1;
  int64 order_id = 2;
  string user_id = 3;
  int32 total_amount = 4;
  google.protobuf.Timestamp confirmed_at = 5;
}
